services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile-backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Ruta del host para bind mount en ejecutores (DooD)
      - HOST_TEMP_PATH=${PWD}/temp
    networks:
      - collabnet
    volumes:
      # Montar socket de Docker para DooD
      - /var/run/docker.sock:/var/run/docker.sock
      # Bind mount a carpeta temp del proyecto
      - ./temp:/shared-temp
    # privileged: true --> Necesario para DiD no para DooD

  frontend:
    build:
      context: .
      dockerfile: Dockerfile-frontend
    ports:
      - "8080:80"
    networks:
      - collabnet

networks:
  collabnet: