<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="/js/main.js"></script>
    <title>CodeHub</title>
    <link rel="stylesheet" href="/styles.css" />
</head>
<body>
    <!-- login -->
    <div id="loginMenu">
        <h2>Registro</h2>
        <input type="text" id="nameInput" placeholder="Nombre" required />
        <input type="password" id="teacherKeyInput" placeholder="Clave de profesor" />
        <input type="text" id="roomIdInput" placeholder="ID de sala (solo estudiantes)" />
        <button id="joinBtn">Entrar</button>
    </div>

    <!-- Editor de código compartido -->
    <div id="editorContainer" class="hidden">
        <div id="roomInfo" class="hidden">
            <span id="roomName">Sala: </span>
            <button id="leaveRoomBtn" class="hidden">Salir de la sala</button>
        </div>
        
        <!-- Menú del editor -->
        <div id="editorControls" class="hidden">
            <select id="languageSelector">
                <option value="c">C</option>
                <option value="cpp">C++</option>
                <option value="java">Java</option>
                <option value="python">Python</option>
            </select>
            <button id="themeToggle" title="Cambiar tema">🌙</button>
        </div>
        
        <!-- Editor de código -->
        <div id="codeEditor"></div> 
    </div>

    <!-- Menú de gestión de salas (solo profesores) -->
    <div id="roomsMenu" class="hidden">
        <h2>Gestión de Salas</h2>
        <div id="createRoomForm">
            <input type="text" id="createRoomIdInput" placeholder="ID de la sala" required />
            <input type="text" id="createRoomCodeInput" placeholder="Código (opcional)" />
            <button id="createRoomBtn">Crear Sala</button>
        </div>
        <h3>Salas Existentes</h3>
        <ul id="roomsList"></ul>
    </div>

    <!-- Menú de participantes  -->
    <div id="participantsMenu" class="hidden">
        <button id="revokeAllBtn">Quitar todos los permisos</button>
        <ul id="participantsList"></ul>
    </div>
</body>
</html>
